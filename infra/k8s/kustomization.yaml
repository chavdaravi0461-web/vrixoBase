apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
metadata:
  name: vrixo

namespace: vrixo

resources:
  - namespace.yaml
  - configmap.yaml
  - secret.yaml
  - deployment-backend.yaml
  - deployment-frontend.yaml
  - service-backend.yaml
  - service-frontend.yaml
  - ingress.yaml
  - hpa.yaml
  - pdb.yaml
  - network-policy.yaml
  - pvc.yaml
  - rbac.yaml

commonLabels:
  app: vrixo
  managed-by: kustomize
