apiVersion: v1
kind: ConfigMap
metadata:
  name: vrixo-config
  namespace: vrixo
  labels:
    app: vrixo
data:
  NODE_ENV: "production"
  API_PREFIX: "api"
  PORT: "4000"
  BACKEND_PORT: "4000"
  FRONTEND_PORT: "3000"
  CORS_ORIGINS: "https://vrixobase.com,https://staging.vrixobase.com"
  LOG_LEVEL: "info"
  MINIO_USE_SSL: "true"
  REDIS_HOST: "redis-master.vrixo.svc.cluster.local"
  REDIS_PORT: "6379"
  POSTGRES_HOST: "postgres-rw.vrixo.svc.cluster.local"
  POSTGRES_PORT: "5432"
  POSTGRES_DB: "vrixo"
  PROMETHEUS_ENABLED: "true"
  METRICS_PREFIX: "vrixo_"
  JWT_ISSUER: "vrixobase-production"
  NODE_OPTIONS: "--max-old-space-size=512"
  GENERATE_SOURCEMAP: "false"
  NEXTAUTH_URL: "https://vrixobase.com"
  NEXT_PUBLIC_API_URL: "https://vrixobase.com/api"
  NEXT_PUBLIC_APP_URL: "https://vrixobase.com"
  NEXT_PUBLIC_WS_URL: "wss://vrixobase.com"
  NEXT_TELEMETRY_DISABLED: "1"
