apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: vrixo
  labels:
    app: vrixo
    component: backend
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/path: "/api/metrics"
    prometheus.io/port: "4000"
spec:
  type: ClusterIP
  ports:
    - port: 4000
      targetPort: http
      protocol: TCP
      name: http
  selector:
    app: vrixo
    component: backend
