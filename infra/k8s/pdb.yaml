apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: backend-pdb
  namespace: vrixo
  labels:
    app: vrixo
    component: backend
spec:
  minAvailable: 2
  selector:
    matchLabels:
      app: vrixo
      component: backend
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: frontend-pdb
  namespace: vrixo
  labels:
    app: vrixo
    component: frontend
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: vrixo
      component: frontend
