[build]
builder = "DOCKERFILE"
dockerfilePath = "backend/Dockerfile"

[deploy]
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
healthcheckPath = "/api/health"
healthcheckTimeout = 300

[[service]]
name = "vrixobase-backend"

[service.ports]
port = 4000
protocol = "http"

[[service.concurrency]]
type = "requests"
softLimit = 50

[[volumes]]
name = "minio-data"
mountPath = "/data"
