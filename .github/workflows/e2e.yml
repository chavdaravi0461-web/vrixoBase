name: E2E Tests
on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  NODE_VERSION: 20
  PNPM_VERSION: 9

jobs:
  e2e:
    timeout-minutes: 30
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: vrixobase
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      minio:
        image: minio/minio:latest
        env:
          MINIO_ROOT_USER: vrixo_admin
          MINIO_ROOT_PASSWORD: vrixo_minio_secret
        ports:
          - 9000:9000
          - 9001:9001
        command: server /data --console-address ":9001"
        options: >-
          --health-cmd "curl -f http://localhost:9000/minio/health/live"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install dependencies
        run: |
          npm ci
          npx prisma generate --schema=backend/prisma/schema.prisma

      - name: Push database schema
        run: npx prisma db push --schema=backend/prisma/schema.prisma
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/vrixobase?schema=public

      - name: Build backend
        run: npm run build -w backend
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/vrixobase?schema=public

      - name: Build frontend
        run: npm run build -w frontend
        env:
          NEXT_PUBLIC_API_URL: http://localhost:4000

      - name: Start backend
        run: |
          npm run start -w backend &
          echo "Waiting for backend..."
          for i in $(seq 1 30); do
            if curl -s http://localhost:4000/api/health > /dev/null 2>&1; then
              echo "Backend ready"
              break
            fi
            sleep 2
          done
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/vrixobase?schema=public
          JWT_ACCESS_SECRET: e2e-test-jwt-secret-key-2026
          JWT_ACCESS_EXPIRES_IN: 24h
          JWT_REFRESH_EXPIRES_IN: 365d
          JWT_ISSUER: vrixobase-e2e
          PORT: 4000
          NODE_ENV: production
          MINIO_ENDPOINT: localhost
          MINIO_PORT: 9000
          MINIO_ACCESS_KEY: vrixo_admin
          MINIO_SECRET_KEY: vrixo_minio_secret
          MINIO_USE_SSL: false
          REDIS_HOST: localhost
          REDIS_PORT: 6379

      - name: Start frontend
        run: |
          npx next start --port 3000 &
          echo "Waiting for frontend..."
          for i in $(seq 1 30); do
            if curl -s http://localhost:3000 > /dev/null 2>&1; then
              echo "Frontend ready"
              break
            fi
            sleep 2
          done
        working-directory: frontend
        env:
          NEXT_PUBLIC_API_URL: http://localhost:4000

      - name: Install Playwright
        run: |
          npm init playwright@latest -- --yes --browsers chromium 2>/dev/null || true
          npx playwright install chromium
        working-directory: e2e
        env:
          PLAYWRIGHT_BROWSERS_PATH: 0

      - name: Run E2E tests
        run: npx playwright test --reporter=list,html,json
        working-directory: e2e
        env:
          NEXT_PUBLIC_API_URL: http://localhost:4000
          NEXT_PUBLIC_APP_URL: http://localhost:3000
          TEST_USER_EMAIL: e2e-test@vrixobase.com
          TEST_USER_PASSWORD: E2eTestPass!2026
          TEST_USER_NAME: E2E Test Runner
          CI: true

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: e2e/reports/
          retention-days: 30

      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-test-results
          path: e2e/reports/test-results/
          retention-days: 14
