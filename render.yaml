services:
  - type: web
    name: vrixobase-api
    env: docker
    repo: https://github.com/chavdaravi0461-web/vrixoBase
    branch: main
    dockerfilePath: backend/Dockerfile
    dockerContext: backend
    healthCheckPath: /api/health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: vrixobase-db
          property: connectionString
      - key: JWT_ACCESS_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: ENCRYPTION_KEY
        generateValue: true
      - key: ENCRYPTION_SALT
        generateValue: true
      - key: SESSION_SECRET
        generateValue: true
      - key: REDIS_HOST
        fromService:
          name: vrixobase-redis
          type: redis
          property: host
      - key: REDIS_PORT
        fromService:
          name: vrixobase-redis
          type: redis
          property: port
      - key: MINIO_ACCESS_KEY
        value: vrixo_admin
      - key: MINIO_SECRET_KEY
        value: please-change-in-production
      - key: MINIO_ENDPOINT
        value: s3.amazonaws.com
      - key: MINIO_PORT
        value: "443"
      - key: MINIO_USE_SSL
        value: "true"
      - key: MINIO_BUCKET
        value: vrixobase
      - key: CORS_ORIGINS
        value: https://vrixo-base-frontend.vercel.app
      - key: NODE_ENV
        value: production

  - type: redis
    name: vrixobase-redis
    plan: free
    maxmemoryPolicy: noeviction

databases:
  - name: vrixobase-db
    plan: free
    databaseType: postgres
    ipAllowList: []
